<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyMaster — Sign Up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body class="bg-slate-50 text-slate-800 dark:bg-slate-950 dark:text-slate-100 min-h-screen flex flex-col justify-center items-center p-4">
    <div class="absolute top-1/4 right-1/4 w-[300px] h-[300px] bg-indigo-500/10 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute bottom-1/4 left-1/4 w-[300px] h-[300px] bg-purple-500/10 rounded-full blur-3xl pointer-events-none"></div>

    <div class="w-full max-w-md relative z-10">
      <!-- Logo Header -->
      <div class="text-center mb-6">
        <a href="index.html" class="inline-flex items-center gap-3 justify-center mb-4">
          <div class="w-12 h-12 rounded-xl bg-gradient-to-tr from-blue-600 to-violet-600 flex items-center justify-center text-white font-bold shadow-lg shadow-blue-500/20">
            <i data-lucide="graduation-cap" class="w-6 h-6"></i>
          </div>
          <span class="text-2xl font-bold font-sans tracking-tight bg-gradient-to-r from-slate-900 to-slate-700 dark:from-white dark:to-slate-300 bg-clip-text text-transparent">StudyMaster</span>
        </a>
        <h2 class="text-xl font-bold text-slate-900 dark:text-white">Create Your Academy Profile</h2>
        <p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Begin orchestrating study sessions efficiently</p>
      </div>

      <!-- Main Signup Card -->
      <div class="glass-card rounded-2xl p-8 border border-slate-200/50 dark:border-slate-800/50 shadow-xl">
        <form id="signupForm" class="space-y-4">
          <div id="alertBox" class="hidden p-4 text-xs font-semibold rounded-xl border"></div>

          <!-- Full Name -->
          <div class="space-y-1.5">
            <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider" for="fullName">Full Name</label>
            <div class="relative">
              <i data-lucide="user" class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 text-slate-400"></i>
              <input type="text" id="fullName" required placeholder="John Doe" class="w-full pl-10 pr-4 py-2 bg-slate-100/50 dark:bg-slate-900/50 focus:bg-white dark:focus:bg-slate-900 rounded-xl text-sm border border-slate-200/50 dark:border-slate-800/50 focus:border-blue-500/50 focus:outline-none transition duration-150" />
            </div>
          </div>

          <!-- Email -->
          <div class="space-y-1.5">
            <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider" for="email">Email Address</label>
            <div class="relative">
              <i data-lucide="mail" class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 text-slate-400"></i>
              <input type="email" id="email" required placeholder="john@uni.edu" class="w-full pl-10 pr-4 py-2 bg-slate-100/50 dark:bg-slate-900/50 focus:bg-white dark:focus:bg-slate-900 rounded-xl text-sm border border-slate-200/50 dark:border-slate-800/50 focus:border-blue-500/50 focus:outline-none transition duration-150" />
            </div>
          </div>

          <!-- Password -->
          <div class="space-y-1.5">
            <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider" for="password">Password</label>
            <div class="relative">
              <i data-lucide="lock" class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 text-slate-400"></i>
              <input type="password" id="password" required placeholder="••••••••" class="w-full pl-10 pr-10 py-2 bg-slate-100/50 dark:bg-slate-900/50 focus:bg-white dark:focus:bg-slate-900 rounded-xl text-sm border border-slate-200/50 dark:border-slate-800/50 focus:border-blue-500/50 focus:outline-none transition duration-150" />
              <button type="button" id="togglePassword" class="absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
                <i data-lucide="eye" id="eyeIcon" class="w-4 h-4"></i>
              </button>
            </div>
          </div>

          <!-- Confirm Password -->
          <div class="space-y-1.5">
            <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider" for="confirmPassword">Confirm Password</label>
            <div class="relative">
              <i data-lucide="shield-check" class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 text-slate-400"></i>
              <input type="password" id="confirmPassword" required placeholder="••••••••" class="w-full pl-10 pr-4 py-2 bg-slate-100/50 dark:bg-slate-900/50 focus:bg-white dark:focus:bg-slate-900 rounded-xl text-sm border border-slate-200/50 dark:border-slate-800/50 focus:border-blue-500/50 focus:outline-none transition duration-150" />
            </div>
          </div>

          <!-- Register button -->
          <button type="submit" id="btnSubmit" class="w-full mt-2 py-3 bg-gradient-to-r from-blue-600 to-violet-600 hover:from-blue-700 hover:to-violet-700 text-white font-medium rounded-xl text-sm shadow-lg shadow-blue-500/20 hover:shadow-blue-500/30 hover:-translate-y-[1px] transition-all duration-150 flex items-center justify-center gap-2">
            Create Profile <i data-lucide="user-plus" class="w-4 h-4"></i>
          </button>
        </form>

        <div class="mt-6 pt-6 border-t border-slate-200/50 dark:border-slate-800/50 text-center text-xs text-slate-400">
          <span>Already registered? </span>
          <a href="login.html" class="text-blue-600 hover:text-blue-500 font-semibold">Sign in here</a>
        </div>
      </div>
    </div>

    <!-- Active dynamic logic script module -->
    <script type="module">
      import { signUpUser, getCurrentUser } from './js/auth.js';

      // Auto check logged in state
      if (getCurrentUser()) {
        window.location.href = 'dashboard.html';
      }

      const form = document.getElementById('signupForm');
      const alertBox = document.getElementById('alertBox');
      const nameInput = document.getElementById('fullName');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const confirmInput = document.getElementById('confirmPassword');
      const togglePasswordBtn = document.getElementById('togglePassword');
      const eyeIcon = document.getElementById('eyeIcon');

      // Password visibility toggles
      togglePasswordBtn.addEventListener('click', () => {
        const isPassword = passwordInput.getAttribute('type') === 'password';
        passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
        confirmInput.setAttribute('type', isPassword ? 'text' : 'password');
        eyeIcon.setAttribute('data-lucide', isPassword ? 'eye-off' : 'eye');
        lucide.createIcons();
      });

      // Show alert helper
      function showAlert(msg, isSuccess = false) {
        alertBox.textContent = msg;
        alertBox.className = `p-4 text-xs font-semibold rounded-xl border ${
          isSuccess 
            ? 'bg-green-100/60 text-green-800 border-green-200 dark:bg-green-900/30 dark:text-green-300 dark:border-green-800/40' 
            : 'bg-red-100/60 text-red-800 border-red-200 dark:bg-red-900/30 dark:text-red-300 dark:border-red-800/40'
        }`;
        alertBox.classList.remove('hidden');
      }

      // Registration handling
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        alertBox.classList.add('hidden');

        const name = nameInput.value.trim();
        const email = emailInput.value.trim();
        const pass = passwordInput.value;
        const confirm = confirmInput.value;

        // Validations
        if (pass.length < 6) {
          showAlert("Password has to be at least 6 characters.");
          return;
        }

        if (pass !== confirm) {
          showAlert("Passwords do not match. Re-enter confirm password.");
          return;
        }

        try {
          showAlert("Creating your profile database...", true);
          await signUpUser(name, email, pass);
          window.location.href = 'dashboard.html';
        } catch (err) {
          showAlert(err.message || "Failed to finalize signup. Try again.");
        }
      });

      // Render Lucide
      lucide.createIcons();
    </script>
  </body>
</html>
